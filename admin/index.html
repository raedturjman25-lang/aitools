<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AIToolsHubPro Admin Publisher</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="stylesheet" href="/styles.css">
  <style>
    body {
      min-height: 100vh;
    }

    .admin-wrap {
      padding: 28px 0 52px;
    }

    .admin-grid {
      display: grid;
      gap: 18px;
      grid-template-columns: minmax(0, 1fr);
    }

    .admin-card {
      background: var(--surface);
      border: 1px solid var(--line);
      border-radius: 16px;
      box-shadow: var(--shadow-sm);
      padding: 18px;
    }

    .admin-card h2 {
      margin: 0 0 12px;
      font-size: 1.05rem;
    }

    .admin-form {
      display: grid;
      gap: 12px;
    }

    .admin-form-row {
      display: grid;
      gap: 12px;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .admin-field {
      display: grid;
      gap: 6px;
    }

    .admin-field label {
      font-weight: 600;
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .admin-field input,
    .admin-field textarea,
    .admin-field select {
      width: 100%;
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 10px;
      padding: 10px 12px;
      font: inherit;
    }

    .admin-field textarea {
      min-height: 220px;
      resize: vertical;
      line-height: 1.5;
    }

    .admin-status {
      white-space: pre-wrap;
      background: var(--surface-muted);
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 12px;
      min-height: 86px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 0.9rem;
    }

    .admin-note {
      margin: 0;
      color: var(--text-soft);
      font-size: 0.92rem;
    }

    .admin-actions {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 860px) {
      .admin-form-row {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="container nav-wrap">
      <a class="brand" href="/" aria-label="AIToolsHubPro home">
        <img class="brand-logo" src="/images/logo.png" alt="AIToolsHubPro Logo" width="156" height="40" loading="eager" decoding="async">
      </a>
      <div class="header-actions">
        <button class="theme-toggle" type="button" aria-label="Switch to dark mode" aria-pressed="false" data-theme-toggle>🌙</button>
      </div>
      <nav class="main-nav open" data-nav-menu>
        <a href="/">Home</a>
        <a href="/blog/">Blog</a>
        <a class="active" href="/admin/">Admin</a>
      </nav>
    </div>
  </header>

  <main class="admin-wrap">
    <div class="container admin-grid">
      <section class="admin-card">
        <h1>Publish Blog Article</h1>
        <p class="admin-note">This panel publishes directly to your GitHub repository, then Cloudflare deploys from Git.</p>
      </section>

      <section class="admin-card">
        <h2>GitHub Connection</h2>
        <div class="admin-form-row">
          <div class="admin-field">
            <label for="owner">Owner</label>
            <input id="owner" type="text" value="raedturjman25-lang" autocomplete="off">
          </div>
          <div class="admin-field">
            <label for="repo">Repository</label>
            <input id="repo" type="text" value="aitools" autocomplete="off">
          </div>
        </div>
        <div class="admin-form-row">
          <div class="admin-field">
            <label for="branch">Branch</label>
            <input id="branch" type="text" value="main" autocomplete="off">
          </div>
          <div class="admin-field">
            <label for="token">GitHub Token (classic PAT)</label>
            <input id="token" type="password" placeholder="ghp_..." autocomplete="off">
          </div>
        </div>
        <p class="admin-note">Required scopes: repo (private repos) or public_repo (public repos).</p>
      </section>

      <section class="admin-card">
        <h2>Post Content</h2>
        <form class="admin-form" id="publish-form">
          <div class="admin-form-row">
            <div class="admin-field">
              <label for="title">Title</label>
              <input id="title" type="text" required>
            </div>
            <div class="admin-field">
              <label for="publish-date">Publish Date</label>
              <input id="publish-date" type="date" required>
            </div>
          </div>

          <div class="admin-form-row">
            <div class="admin-field">
              <label for="description">Description</label>
              <input id="description" type="text" required>
            </div>
            <div class="admin-field">
              <label for="category">Category (optional)</label>
              <input id="category" type="text" placeholder="AI Productivity">
            </div>
          </div>

          <div class="admin-form-row">
            <div class="admin-field">
              <label for="external-url">Custom URL (optional)</label>
              <input id="external-url" type="text" placeholder="Leave blank for /blog/post-slug/">
            </div>
            <div class="admin-field">
              <label for="image-file">Feature Image</label>
              <input id="image-file" type="file" accept="image/*">
            </div>
          </div>

          <div class="admin-field">
            <label for="image-alt">Feature Image Alt</label>
            <input id="image-alt" type="text" placeholder="Describe the image for accessibility">
          </div>

          <div class="admin-field">
            <label for="body">Article Body (Markdown)</label>
            <textarea id="body" required placeholder="# Introduction\n\nWrite your article in Markdown...\n\n## Section\n- Point one\n- Point two"></textarea>
          </div>

          <div class="admin-actions">
            <button class="btn btn-primary" id="publish-btn" type="submit">Publish Article</button>
            <button class="btn btn-secondary" id="clear-btn" type="button">Clear Form</button>
          </div>
        </form>
      </section>

      <section class="admin-card">
        <h2>Publishing Log</h2>
        <div class="admin-status" id="status">Waiting for input...</div>
      </section>
    </div>
  </main>

  <script src="/script.js" defer></script>
  <script src="/admin/publisher.js" defer></script>
</body>
</html>
