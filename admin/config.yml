backend:
  name: git-gateway
  branch: main

media_folder: images
public_folder: /images

collections:
  - name: blog
    label: Blog
    folder: content/blog
    create: true
    extension: md
    format: frontmatter
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    summary: "{{title}} - {{date}}"
    fields:
      - { label: Title, name: title, widget: string }
      - { label: Publish Date, name: date, widget: datetime }
      - { label: Description, name: description, widget: text }
      - { label: Feature Image, name: image, widget: image, required: false }
      - { label: Tool Category, name: category, widget: string, required: false }
      - { label: External URL, name: url, widget: string, required: false }
      - { label: Body, name: body, widget: markdown }
